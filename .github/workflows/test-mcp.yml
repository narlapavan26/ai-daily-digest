name: MCP Smoke Tests

on:
  workflow_dispatch:
    inputs:
      mcp_url:
        description: "MCP server URL to test against (empty = start local)"
        type: string
        default: ""

jobs:
  smoke-test:
    name: "MCP Endpoint Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r mcp/requirements.txt
          pip install -r digest_runner/requirements.txt
          pip install pytest pytest-timeout

      - name: Start local MCP server
        if: github.event.inputs.mcp_url == ''
        working-directory: mcp
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health > /dev/null 2>&1 && break
            sleep 1
          done
          echo "MCP server ready on :8000"

      - name: Run source tests (non-Reddit)
        run: |
          MCP_URL="${{ github.event.inputs.mcp_url }}"
          if [ -z "$MCP_URL" ]; then
            MCP_URL="http://localhost:8000"
          fi
          echo "Testing against: $MCP_URL"
          # Note: these tests are standalone scripts, they don't use pytest markers
          # We run them directly and allow failures (they test real external APIs)
          python tests/test_arxiv.py || true
          python tests/test_hackernews.py || true
          python tests/test_stackoverflow.py || true
        env:
          MCP_BASE_URL: http://localhost:8000
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
