name: Daily Digest

on:
  schedule:
    - cron: "30 1 * * *"  # 7:00 AM IST daily
  workflow_dispatch:
    inputs:
      sources:
        description: "Space-separated sources (empty = all default)"
        type: string
        default: ""
      dry_run:
        description: "Skip publishers (test mode)"
        type: boolean
        default: false

jobs:
  generate:
    name: "Generate Daily Digest"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r mcp/requirements.txt
          pip install -r digest_runner/requirements.txt

      # ── Health check: ensure production MCP is alive before running ──────────
      - name: Wait for MCP health check
        run: |
          HEALTH_URL="${{ secrets.MCP_SERVER_URL }}"
          HEALTH_URL="${HEALTH_URL%/mcp}/health"
          echo "Checking production MCP health at: $HEALTH_URL"

          MAX_RETRIES=3
          RETRY_DELAY=20
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Production MCP is healthy (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i/$MAX_RETRIES failed (HTTP $HTTP_STATUS). Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          echo "❌ Production MCP health check failed after $MAX_RETRIES attempts."
          exit 1

      - name: Run digest pipeline
        run: |
          ARGS="--output-dir outputs"
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            ARGS="$ARGS --publish"
          fi
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            ARGS="$ARGS --sources ${{ github.event.inputs.sources }}"
          fi
          echo "Running: python -m digest_runner.main $ARGS"
          python -m digest_runner.main $ARGS
        env:
          MCP_BASE_URL: ${{ secrets.MCP_SERVER_URL }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: outputs/
          retention-days: 30
