name: Daily Digest

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Space-separated sources (empty = all default)"
        type: string
        default: ""
      dry_run:
        description: "Skip publishers (test mode)"
        type: boolean
        default: false

jobs:
  generate:
    name: "Generate Daily Digest"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r mcp/requirements.txt
          pip install -r digest_runner/requirements.txt

      - name: Run digest pipeline
        run: |
          ARGS="--output-dir outputs"
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            ARGS="$ARGS --sources ${{ github.event.inputs.sources }}"
          fi
          python -m digest_runner.main $ARGS
        env:
          MCP_BASE_URL: ${{ secrets.MCP_PRODUCTION_URL }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: outputs/
          retention-days: 30

      - name: Commit digest to repo (scheduled runs only)
        if: success() && github.event_name == 'schedule'
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp outputs/digest_*.md digests/latest.md 2>/dev/null || true
          git add digests/latest.md outputs/ || true
          git diff --staged --quiet || git commit -m "Daily digest: $DATE [skip ci]"
          git push || true
