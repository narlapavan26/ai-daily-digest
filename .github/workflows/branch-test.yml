name: Branch Push Pipeline Test

on:
  push:
    branches:
      - 'feature/**'
      - 'test/**'
  workflow_dispatch:
    inputs:
      publish_live:
        description: "Publish Live to Discord/Telegram? (Leave unchecked for safe Dry Run)"
        type: boolean
        default: false

jobs:
  run-tests:
    name: "Run All Test Cases"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r mcp/requirements.txt
          pip install -r digest_runner/requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run all Unit Tests
        run: |
          python -m pytest tests/unit/ -v --tb=short
        env:
          GROQ_API_KEY: "dummy-key"
          GEMINI_API_KEY: "dummy-key"

  run-pipeline:
    name: "Run Pipeline and Publish"
    runs-on: ubuntu-latest
    needs: run-tests  # This guarantees it waits for tests to pass!
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r mcp/requirements.txt
          pip install -r digest_runner/requirements.txt

      # ── Dynamic MCP URL: derive branch-specific Horizon URL ─────────────────
      # Prefect Horizon automatically deploys each branch at a predictable URL:
      #   main  → https://ai-daily-digest-mcp.fastmcp.app/mcp  (from secret)
      #   other → https://ai-daily-digest-mcp-{branch-slug}.fastmcp.app/mcp
      #
      # Branch slug rules (confirmed from fastmcp.com docs):
      #   1. lowercase everything
      #   2. replace '/', '_', spaces with '-'
      #   3. collapse multiple consecutive hyphens into one
      # Example: feature/ci-cd-pipeline-hardening → feature-ci-cd-pipeline-hardening
      - name: Resolve MCP URL for this branch
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Current branch: $BRANCH"

          if [ "$BRANCH" = "main" ]; then
            MCP_URL="${{ secrets.MCP_SERVER_URL }}"
            echo "Using production MCP URL (main branch)"
          else
            # Slugify: lowercase, replace /\_space with -, collapse multiple -
            SLUG=$(echo "$BRANCH" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's|[/_ ]|-|g' \
              | sed 's|-\{2,\}|-|g' \
              | sed 's|-$||')
            MCP_URL="https://ai-daily-digest-mcp-${SLUG}.fastmcp.app/mcp"
            echo "Using branch-specific MCP URL for slug: $SLUG"
          fi

          echo "MCP_BASE_URL=$MCP_URL" >> $GITHUB_ENV
          echo "Resolved MCP_BASE_URL: $MCP_URL"

      # ── Health check: ensure the Horizon container is alive before running ───
      # Retries up to 14 times with 30s delay (7 min total) to allow Horizon
      # to finish deploying the container after the git push.
      # NOTE: Horizon requires Bearer auth even on /health — pass token in header.
      - name: Wait for MCP health check
        env:
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
        run: |
          HEALTH_URL="${MCP_BASE_URL%/mcp}/health"
          echo "Checking MCP health at: $HEALTH_URL"

          MAX_RETRIES=14
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              -H "Authorization: Bearer ${MCP_BEARER_TOKEN}" \
              "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ MCP is healthy (attempt $i) — status $HTTP_STATUS"
              exit 0
            fi
            echo "⏳ Attempt $i/$MAX_RETRIES — HTTP $HTTP_STATUS. Waiting ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          echo "❌ MCP health check failed after $MAX_RETRIES attempts (7 min)."
          echo "   URL checked: $HEALTH_URL"
          echo "   Last HTTP status — 401=auth issue, 404=wrong URL, 000=no response/still deploying"
          exit 1

      - name: Run full digest pipeline
        run: |
          ARGS="--output-dir outputs"
          # By default on 'push', this is null. It's only 'true' if manually checked via workflow_dispatch.
          if [ "${{ github.event.inputs.publish_live }}" == "true" ]; then
            echo "Live Mode: Publishing to Discord/Telegram!"
            ARGS="$ARGS --publish"
          else
            echo "Safe Mode: Publishers disabled by default"
          fi
          echo "Running: python -m digest_runner.main $ARGS"
          echo "MCP target: $MCP_BASE_URL"
          python -m digest_runner.main $ARGS
        env:
          # MCP_BASE_URL is already set in $GITHUB_ENV by the Resolve step above
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-test-digest-${{ github.run_id }}
          path: outputs/
          retention-days: 7
