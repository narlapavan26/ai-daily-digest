name: "Setup Python Environment"
description: "Install Python 3.11, cache pip, install deps"
inputs:
  requirements-file:
    description: "Path to requirements.txt"
    required: true
  extra-requirements:
    description: "Additional requirements file (optional)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        cache-dependency-path: ${{ inputs.requirements-file }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ inputs.requirements-file }}
        if [ -n "${{ inputs.extra-requirements }}" ]; then
          pip install -r ${{ inputs.extra-requirements }}
        fi
        pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx
